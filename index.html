<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Counter Button </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet"  href="style.css"/>
</head>
<body>

<<div class="counter">

  <h1 class="counter__title">Fancy Counter</h1>

  <span class="counter__value">0</span>

  <button class="counter__reset-button">
    <i class="fa-solid fa-arrows-rotate counter__reset-icon"></i>
  </button>

  <div class="counter__buttons">
    
    <button class="counter__button counter__button--decrease">
      <i class="fa-solid fa-minus counter__icon"></i>
    </button>

    <button class="counter__button counter__button--increase">
      <i class="fa-solid fa-plus counter__icon"></i>
    </button>

  </div>

</div>
</div>
</div>
</div>

<script src="script.js"></script>  
</body>
</html>
